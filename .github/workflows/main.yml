name: Second CI

run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on:
  #push:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      #----------------------
      # First Step
      #----------------------
      - name: File creation with data
        run: |
          cat <<EOF > github-actions.txt
          "${{ github.actor }} created this file for GitHub Actions 🚀"
          "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
          "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
          "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
          "🍏 This job's status is ${{ job.status }}."
          EOF
          
      #----------------------
      # Second Step
      #----------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: "GitHubActions-artifact"
          path: .

  test:
    runs-on: ubuntu-latest
    steps:
      #----------------------
      # First Step
      #----------------------
      - name: Step-1
        run: echo "Test-First Step."
      #----------------------
      # Second Step
      #----------------------
      - name: Step-2
        run: echo "Test-Second Step."

  deploy:
    runs-on: ubuntu-latest
    steps:
      #----------------------
      # First Step
      #----------------------
      - name: Step-1
        run: echo "Deploy-First Step."
      #----------------------
      # Second Step
      #----------------------
      - name: Step-2
        run: echo "Deploy-Second Step."

  notify:
    runs-on: ubuntu-latest
    steps:
      #----------------------
      # First Step
      #----------------------
      - name: Step-1
        run: echo "Notify-First Step."
      #----------------------
      # Second Step
      #----------------------
      - name: Step-2
        run: echo "Notify-Second Step."
