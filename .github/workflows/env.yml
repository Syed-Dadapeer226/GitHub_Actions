name: Env, Sec, Conf, input Workflow

on:
  workflow_dispatch:
  #Input
    inputs:
      environment:
        description: "Choose environment"
        required: true
        default: "Production"

# ENV

jobs:
  demo:
    runs-on: ubuntu-latest
    #Job env
    env:
      APP_NAME: "GitHub Actions"

    steps:
      - name: First Step
        #Only this step env (Input env)
        env:
          WORKFLOW_MESSAGE: "Running this from ${{ inputs.environment }}"
        run: |
          # inputs/user inputs
          echo "Workflow - $WORKFLOW_MESSAGE"
          
          # env/Environment variables
          echo "App Name - $APP_NAME"
          
          #Secrets (Stored in settings) 
          echo "App Password - ${{ secrets.APP_PASSWORD }}"
          
          # var/Global Config Variables
          echo "${{ vars.APP_MESSAGE }}"
